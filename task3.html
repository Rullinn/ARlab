<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Завдання 3 — Hit Test + Icosahedron</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }
    canvas { display: block; }

    #ui {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    #back {
      color: #d4a843; text-decoration: none; font-size: 0.75rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid #d4a843; padding: 0.35rem 0.7rem;
    }
    #label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }

    #hint {
      position: fixed; bottom: 8rem; left: 50%; transform: translateX(-50%);
      z-index: 10; font-size: 0.7rem; color: rgba(255,255,255,0.6);
      text-align: center; letter-spacing: 0.06em;
      background: rgba(0,0,0,0.5); padding: 0.5rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #bottom-ui {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
    }

    #counter {
      font-size: 0.7rem; color: #d4a843; letter-spacing: 0.1em; text-transform: uppercase;
    }

    #ARButton {
      background: #d4a843 !important; color: #000 !important; border: none !important;
      padding: 0.7rem 2rem !important; font-family: monospace !important;
      font-size: 0.75rem !important; letter-spacing: 0.15em !important;
      text-transform: uppercase !important; cursor: pointer !important;
    }
  </style>
</head>
<body>

<div id="ui">
  <a href="index.html" id="back">← Назад</div>
  <span id="label">Завдання 03 · Hit Test</span>
</div>

<div id="hint">Наведи камеру на поверхню → торкнись для розміщення</div>

<div id="bottom-ui">
  <div id="counter">Розміщено об'єктів: 0</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

let camera, scene, renderer;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;
let controller;
let placedCount = 0;
const counterEl = document.getElementById('counter');

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  // Освітлення
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444455, 2);
  scene.add(hemi);

  const dirLight = new THREE.DirectionalLight(0xfff0cc, 3);
  dirLight.position.set(2, 4, 2);
  scene.add(dirLight);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // AR Button — ВАЖЛИВО: потрібен hit-test feature
  const arBtn = ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.body }
  });
  arBtn.id = 'ARButton';
  document.getElementById('bottom-ui').prepend(arBtn);

  // Reticle — індикатор поверхні (кільце)
  const reticleGeo = new THREE.RingGeometry(0.04, 0.055, 32);
  reticleGeo.rotateX(-Math.PI / 2); // Кладемо горизонтально
  const reticleMat = new THREE.MeshBasicMaterial({
    color: 0xd4a843,
    side: THREE.DoubleSide,
  });
  reticle = new THREE.Mesh(reticleGeo, reticleMat);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // Контролер — обробка торкання
  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  window.addEventListener('resize', onResize);
}

function onSelect() {
  // Розміщуємо IcosahedronGeometry де знаходиться reticle
  if (reticle.visible) {
    const geo = new THREE.IcosahedronGeometry(0.06, 0);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(placedCount * 0.15, 0.8, 0.5),
      metalness: 0.3,
      roughness: 0.4,
      emissive: new THREE.Color().setHSL(placedCount * 0.15, 0.6, 0.1),
    });
    const mesh = new THREE.Mesh(geo, mat);

    // Позиція і орієнтація з reticle
    mesh.position.setFromMatrixPosition(reticle.matrix);
    mesh.quaternion.setFromRotationMatrix(reticle.matrix);

    // Невелика випадкова анімація — зберігаємо початковий кут
    mesh.userData.rotationSpeed = (Math.random() - 0.5) * 0.04;
    mesh.userData.hoverOffset = Math.random() * Math.PI * 2;

    scene.add(mesh);

    placedCount++;
    counterEl.textContent = `Розміщено об'єктів: ${placedCount}`;
  }
}

function animate() {
  renderer.setAnimationLoop((time, frame) => {
    if (frame) {
      const referenceSpace = renderer.xr.getReferenceSpace();
      const session = renderer.xr.getSession();

      // Запит Hit Test Source (один раз)
      if (!hitTestSourceRequested) {
        session.requestReferenceSpace('viewer').then((viewerSpace) => {
          session.requestHitTestSource({ space: viewerSpace }).then((source) => {
            hitTestSource = source;
          });
        });

        session.addEventListener('end', () => {
          hitTestSourceRequested = false;
          hitTestSource = null;
        });

        hitTestSourceRequested = true;
      }

      // Оновлення reticle
      if (hitTestSource) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);

        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(referenceSpace);

          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        } else {
          reticle.visible = false;
        }
      }
    }

    // Анімуємо розміщені об'єкти
    const t = performance.now() * 0.001;
    scene.children.forEach((obj) => {
      if (obj.userData.rotationSpeed !== undefined) {
        obj.rotation.y += obj.userData.rotationSpeed;
        obj.position.y += Math.sin(t * 2 + obj.userData.hoverOffset) * 0.0002;
      }
    });

    renderer.render(scene, camera);
  });
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
